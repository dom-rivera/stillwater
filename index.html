<style>
  :root{
    color-scheme:dark;
    --night:#0C1120;
    --pool:#131A2E;
    --surface:#1A2238;
    --line:rgba(233,235,245,.08);
    --ink:#EDEEF6;
    --muted:#98A0BC;
    --faint:#6B7394;
    --moon:#F4F1E4;
    --orb-a:#8E9BFF;
    --orb-b:#F2A98B;
    --orb-c:#C6B7FF;
    --good:#9DD3B0;
    --radius:20px;
    --display:'Fraunces', Georgia, 'Times New Roman', serif;
    --body:'Albert Sans', -apple-system, 'Segoe UI', sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  html{background:var(--night); -webkit-text-size-adjust:100%;}
  body{
    background:
      radial-gradient(1200px 700px at 50% -10%, #182036 0%, var(--night) 60%),
      var(--night);
    color:var(--ink);
    font-family:var(--body);
    font-weight:300;
    letter-spacing:.01em;
    line-height:1.55;
    display:flex;
    justify-content:center;
  }
  #app{
    width:100%;
    max-width:440px;
    min-height:100vh;   /* fallback */
    min-height:100dvh;
    display:flex;
    flex-direction:column;
    position:relative;
  }
  main{flex:1; padding:28px 22px 110px; overflow-x:hidden;}

  /* ---------- type ---------- */
  h1,h2,h3{font-family:var(--display); font-weight:400; letter-spacing:.005em;}
  .eyebrow{
    font-size:11px; text-transform:uppercase; letter-spacing:.22em;
    color:var(--faint); font-weight:500; margin-bottom:8px;
  }
  .greeting{font-size:34px; line-height:1.15; font-weight:300; margin-bottom:4px;}
  .sub{color:var(--muted); font-size:15px;}

  /* ---------- orb (signature) ---------- */
  .orb-wrap{display:flex; flex-direction:column; align-items:center; margin:34px 0 26px;}
  .orb{
    width:190px; height:190px; border-radius:50%;
    position:relative;
    background:
      radial-gradient(circle at 34% 30%, var(--orb-c) 0%, transparent 55%),
      radial-gradient(circle at 70% 72%, var(--orb-b) 0%, transparent 58%),
      radial-gradient(circle at 50% 50%, var(--orb-a) 0%, #3A4470 78%);
    box-shadow:
      0 0 60px rgba(142,155,255,.22),
      0 0 140px rgba(242,169,139,.10),
      inset 0 0 40px rgba(255,255,255,.06);
    transition:transform 4s cubic-bezier(.4,0,.4,1);
    transform:scale(1);
    animation:drift 14s ease-in-out infinite alternate;
    cursor:pointer;
  }
  .orb::after{
    content:''; position:absolute; inset:-24px; border-radius:50%;
    border:1px solid rgba(233,235,245,.07);
  }
  @keyframes drift{
    from{filter:hue-rotate(0deg) brightness(1);}
    to{filter:hue-rotate(-18deg) brightness(1.07);}
  }
  @media (prefers-reduced-motion: reduce){
    .orb{animation:none; transition:opacity 2s ease, transform 2s ease;}
  }
  .orb.idle-breath{animation:drift 14s ease-in-out infinite alternate, idle 9s ease-in-out infinite;}
  @keyframes idle{
    0%,100%{transform:scale(.97);}
    50%{transform:scale(1.03);}
  }
  @media (prefers-reduced-motion: reduce){ .orb.idle-breath{animation:none;} }

  /* ---------- cards & lists ---------- */
  .card{
    background:linear-gradient(180deg, var(--surface), var(--pool));
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:18px;
    margin-bottom:12px;
    cursor:pointer;
    transition:border-color .25s ease, transform .25s ease;
  }
  .card:active{transform:scale(.985);}
  .card:hover{border-color:rgba(233,235,245,.18);}
  .card h3{font-size:19px; margin-bottom:3px;}
  .card .meta{font-size:12.5px; color:var(--faint); letter-spacing:.06em; text-transform:uppercase;}
  .card p{font-size:14px; color:var(--muted); margin-top:6px;}
  .row{display:flex; align-items:center; justify-content:space-between; gap:12px;}

  .section-title{
    font-family:var(--display); font-size:22px; font-weight:400;
    margin:30px 0 14px;
  }
  .section-title:first-child{margin-top:0;}

  .pillrow{display:flex; gap:8px; flex-wrap:wrap; margin:10px 0 4px;}
  .pill{
    border:1px solid var(--line); border-radius:999px;
    background:transparent; color:var(--muted);
    font-family:var(--body); font-size:13.5px; font-weight:400;
    padding:7px 15px; cursor:pointer;
    transition:all .2s ease;
  }
  .pill.on{background:var(--moon); color:var(--night); border-color:var(--moon); font-weight:500;}

  /* ---------- nav ---------- */
  nav{
    position:fixed; bottom:0; left:50%; transform:translateX(-50%);
    width:100%; max-width:440px;
    display:flex;
    background:rgba(12,17,32,.85);
    -webkit-backdrop-filter:blur(14px);
    backdrop-filter:blur(14px);
    border-top:1px solid var(--line);
    padding:10px 8px calc(10px + env(safe-area-inset-bottom));
    z-index:40;
  }
  nav button{
    flex:1; background:none; border:none; color:var(--faint);
    font-family:var(--body); font-size:12px; letter-spacing:.08em;
    display:flex; flex-direction:column; align-items:center; gap:5px;
    cursor:pointer; padding:4px 0;
  }
  nav button svg{width:21px; height:21px; stroke:currentColor; fill:none; stroke-width:1.5;}
  nav button.on{color:var(--moon);}

  /* ---------- buttons ---------- */
  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    background:var(--moon); color:var(--night);
    border:none; border-radius:999px;
    font-family:var(--body); font-weight:500; font-size:15px;
    padding:13px 30px; cursor:pointer;
    transition:transform .2s ease, opacity .2s ease;
  }
  .btn:active{transform:scale(.97);}
  .btn.ghost{background:transparent; color:var(--muted); border:1px solid var(--line);}
  .btn.small{padding:8px 18px; font-size:13.5px;}

  /* ---------- player overlay ---------- */
  #player{
    position:fixed; inset:0; z-index:60;
    background:
      radial-gradient(900px 600px at 50% 20%, #161E36 0%, var(--night) 70%),
      var(--night);
    display:none; flex-direction:column; align-items:center;
    padding:26px 24px calc(26px + env(safe-area-inset-bottom));
    overflow-y:auto;
  }
  #player.open{display:flex;}
  .player-inner{width:100%; max-width:440px; flex:1; display:flex; flex-direction:column; align-items:center;}
  .player-top{width:100%; display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;}
  .icon-btn{
    background:none; border:1px solid var(--line); color:var(--muted);
    width:40px; height:40px; border-radius:50%; cursor:pointer;

/* ---------------- persistence adapter ----------------
   Tries, in order:
   1. window.storage  (Claude artifact key-value store)
   2. localStorage    (when you save this file and open it yourself)
   3. in-memory       (always works; lost on refresh)
------------------------------------------------------- */
const store = {
  KEY:'stillwater-data',
  mem:null,
  async load(){
    try{
      if (window.storage && window.storage.get){
        const r = await window.storage.get(this.KEY);
        if (r && r.value) return JSON.parse(r.value);
      }
    }catch(e){ /* key missing or unavailable */ }
    try{
      const v = localStorage.getItem(this.KEY);
      if (v != null) return JSON.parse(v);
    }catch(e){ /* blocked */ }
    return this.mem;
  },
  async save(data){
    this.mem = data;
    const s = JSON.stringify(data);
    try{ if (window.storage && window.storage.set) await window.storage.set(this.KEY, s); }catch(e){}
    try{ localStorage.setItem(this.KEY, s); }catch(e){}
  },
  async erase(){
    this.mem = null;
    try{ if (window.storage && window.storage.delete) await window.storage.delete(this.KEY); }catch(e){}
    try{ localStorage.removeItem(this.KEY); }catch(e){}
  }
};

/* ---------------- view-model ---------------- */
let state = {
  tab:'today',
  data:{ sessions:[], moods:[] }   // sessions: {id,title,minutes,ts}; moods: {mood,ts}
};

function todayKey(ts){ const d=new Date(ts); return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate(); }

function streak(){
  const days = new Set(state.data.sessions.map(s=>todayKey(s.ts)));
  if (!days.size) return 0;
  let n=0; const d=new Date();
  if (!days.has(todayKey(d.getTime()))) d.setDate(d.getDate()-1); // streak may end yesterday
  while (days.has(todayKey(d.getTime()))){ n++; d.setDate(d.getDate()-1); }
  return n;
}
function totalMinutes(){ return state.data.sessions.reduce((a,s)=>a+s.minutes,0); }

  ctx:null, master:null, muted:false,
  ambient:null, ambientId:null,
  ensure(){

      const AC = window.AudioContext || window.webkitAudioContext;
      this.ctx = new AC();
      this.master = this.ctx.createGain();
      this.master.gain.value = this.muted ? 0 : 1;
      this.master.connect(this.ctx.destination);

    if (this.ctx.state === 'suspended') this.ctx.resume();
  },
  setMuted(m){
    this.muted = m;
    if (this.master) this.master.gain.setTargetAtTime(m?0:1, this.ctx.currentTime, .05);
    try{ if (Voice.clip) Voice.clip.muted = m; if (m && Voice.clip) Voice.clip.pause(); }catch(e){}
  },
  bell(freq=396, dur=5, vol=.5){
    if (this.muted) {/* still schedule silently? no — skip */}
    this.ensure();
    const t = this.ctx.currentTime;
    [[1,1],[2.4,.4],[5.1,.18]].forEach(([mult, g])=>{
      const o = this.ctx.createOscillator();
      const gn = this.ctx.createGain();
      o.type='sine'; o.frequency.value = freq*mult;
      gn.gain.setValueAtTime(0, t);
      gn.gain.linearRampToValueAtTime(vol*g, t+.02);
      gn.gain.exponentialRampToValueAtTime(.0001, t+dur);
      o.connect(gn); gn.connect(this.master);
      o.start(t); o.stop(t+dur+.1);
    });
  },
  noiseBuffer(){
    if (this._nb) return this._nb;
    const len = this.ctx.sampleRate * 2;
    const buf = this.ctx.createBuffer(1, len, this.ctx.sampleRate);
    const d = buf.getChannelData(0);
    let last = 0;
    for (let i=0;i<len;i++){
      const w = Math.random()*2-1;
      last = (last + .02*w)/1.02;      // gentle pinking
      d[i] = (w*.35 + last*3)*.5;
    }
    this._nb = buf;
    return buf;
  },
  startAmbient(id){
    this.ensure();
    this.stopAmbient();
    const src = this.ctx.createBufferSource();
    src.buffer = this.noiseBuffer(); src.loop = true;
    const filt = this.ctx.createBiquadFilter();
    const gain = this.ctx.createGain();
    const lfo  = this.ctx.createOscillator();
    const lfoG = this.ctx.createGain();
    const t = this.ctx.currentTime;

    if (id==='rain'){
      filt.type='bandpass'; filt.frequency.value=2600; filt.Q.value=.4;
      gain.gain.value=.16;
      lfo.frequency.value=.35; lfoG.gain.value=250;
      lfo.connect(lfoG); lfoG.connect(filt.frequency);
    } else if (id==='ocean'){
      filt.type='lowpass'; filt.frequency.value=480; filt.Q.value=.8;
      gain.gain.value=.001;
      lfo.frequency.value=.07; lfoG.gain.value=.22;   // slow swell on volume
      lfo.connect(lfoG); lfoG.connect(gain.gain);
      gain.gain.setValueAtTime(.24, t);
    } else { // wind
      filt.type='bandpass'; filt.frequency.value=700; filt.Q.value=1.4;
      gain.gain.value=.18;
      lfo.frequency.value=.11; lfoG.gain.value=420;
      lfo.connect(lfoG); lfoG.connect(filt.frequency);
    }
    src.connect(filt); filt.connect(gain); gain.connect(this.master);
    // fade in
    const g0 = gain.gain.value || .2;
    gain.gain.cancelScheduledValues(t);
    gain.gain.setValueAtTime(0.0001, t);
    gain.gain.exponentialRampToValueAtTime(Math.max(g0,.02), t+2.5);
    src.start();
    lfo.start();
    this.ambient = {src, lfo, gain};
    this.ambientId = id;
  },
  stopAmbient(){
    if (!this.ambient) return;
    const {src, lfo, gain} = this.ambient;
    try{
      const t = this.ctx.currentTime;
      gain.gain.cancelScheduledValues(t);
      gain.gain.setTargetAtTime(0.0001, t, .4);
      setTimeout(()=>{ try{src.stop(); lfo.stop();}catch(e){} }, 1600);
    }catch(e){}
    this.ambient = null; this.ambientId = null;
  }
};

/* ---------------- voice engine (on-device speech synthesis) ----------------
   Uses the browser's built-in Web Speech API. The device itself reads the
   guidance aloud. Voices are ranked by quality — modern "natural" / neural /
   enhanced voices are strongly preferred — and the listener can pick their
   favorite in the You tab.
----------------------------------------------------------------------------- */
const Voice = {
  supported: ('speechSynthesis' in window) && ('SpeechSynthesisUtterance' in window),
  enabled: true,          // user toggle, persisted in saved data
  _voice: null,

  score(v){
    if (!/^en/i.test(v.lang)) return -1;
    const n = v.name || '';
    let s = 10;
    if (/natural/i.test(n))            s += 120;  // neural voices (Edge, etc.)
    if (/neural/i.test(n))             s += 110;
    if (/premium|enhanced/i.test(n))   s += 90;   // iOS/macOS upgraded voices
    const prefs = ['Olivia','Aria','Jenny','Emma','Samantha','Ava','Sonia','Libby',
                   'Michelle','Natasha','Zoe','Allison','Karen','Moira','Tessa',
                   'Google UK English Female','Google US English'];
    if (prefs.some(p => n.indexOf(p) !== -1)) s += 50;
    if (/olivia|aria|jenny|emma/i.test(n))    s += 15;  // warmest of the warm
    if (/compact|eloquence|fred|zarvox|albert|bad news|bells|whisper/i.test(n)) s -= 60;
    if (v.localService) s += 5;
    return s;
  },

  list(){
    if (!this.supported) return [];
    return speechSynthesis.getVoices()
      .filter(v => /^en/i.test(v.lang))
      .sort((a,b) => this.score(b) - this.score(a));
  },

  pick(){
    // One curated voice per device — the calmest, most natural available.
    // vs is score-sorted, so the first ladder match is the best variant
    // (e.g. 'Samantha (Enhanced)' outranks plain 'Samantha').
    const vs = this.list();
    if (!vs.length) return null;
    const ladder = ['Ava Multilingual','Aria','Jenny','Olivia','Emma','Samantha',
                    'Libby','Sonia','Karen','Moira',
                    'Google UK English Female','Google US English'];
    for (const name of ladder){
      const m = vs.find(v => (v.name||'').indexOf(name) !== -1);
      if (m) return m;
    }
    return vs[0];
  },

  init(){
    if (!this.supported) return;
    this._voice = this.pick();
    if (speechSynthesis.onvoiceschanged !== undefined){
      speechSynthesis.addEventListener('voiceschanged', ()=>{
        this._voice = this.pick();
      });
    }
  },

  unlock(){
    // iOS/Safari: first speak() must happen inside a user gesture.
    if (!this.supported) return;
    try{
      const u = new SpeechSynthesisUtterance(' ');
      u.volume = 0;
      speechSynthesis.speak(u);
    }catch(e){}
  },

  _seq: 0,       // invalidates any queued sentences when we stop or restart
  everStarted: false,   // set the first time any utterance audibly starts
  useFiles: false,       // true when the voice/ folder of recordings exists
  clip: null,            // single reused element (iOS unlock persists on it)

  probeFiles(){
    try{
      if (!window.fetch) return;
      fetch('voice/prelude.mp3', {method:'HEAD'})
        .then(r => { this.useFiles = !!(r && r.ok); })
        .catch(()=>{ this.useFiles = false; });
    }catch(e){}
  },

  playClip(fn, seq, text, force){
    try{
      if (!this.clip){ this.clip = new window.Audio(); this.clip.preload = 'auto'; }
      const c = this.clip;
      c.onended = null; c.onerror = null; c.onplaying = null;
      try{ c.pause(); }catch(e){}
      c.src = 'voice/' + fn;
      c.muted = Audio.muted;
      c.onplaying = ()=>{ this.everStarted = true; };
      c.onerror   = ()=>{ if (seq === this._seq) this._synth(text, force, seq); };
      const p = c.play();
      if (p && p.catch) p.catch(()=>{ if (seq === this._seq) this._synth(text, force, seq); });
    }catch(e){ this._synth(text, force, seq); }
  },
  _current: null, // hold a reference: Chrome garbage-collects live utterances otherwise

  speak(text, force){
    if (Audio.muted) return;
    if (!this.enabled && !force) return;
    this._seq++;
    const seq = this._seq;
    // Recorded voice first: identical sound on every device.
    if (this.useFiles && VOICE_FILES[text]){
      this.playClip(VOICE_FILES[text], seq, text, force);
      return;
    }
    if (!this.supported) return;
    this._synth(text, force, seq);
  },

  _synth(text, force, seq){
    if (!this.supported) return;

    // Soften the phrasing: ellipses and dashes become breathing room,
    // and each sentence is spoken on its own, with a real pause between
    // sentences instead of one flat run-on stream.
    const clean = text.replace(/\u2026/g, '. ').replace(/\u2014/g, ', ');
    const parts = clean.split(/[.?!]+\s*/).map(s => s.trim()).filter(Boolean);

    const next = (i)=>{
      if (seq !== this._seq || i >= parts.length) return;
      if (Audio.muted || (!this.enabled && !force)) return;
      try{
        if (!this._voice) this._voice = this.pick();   // voices may load late
        const isNeural = this._voice && /natural|neural|premium|enhanced/i.test(this._voice.name || '');
        const u = new SpeechSynthesisUtterance(parts[i] + '.');
        if (this._voice) u.voice = this._voice;
        // Neural voices sound most human near natural speed; older robotic
        // voices soften when slowed down and pitched slightly lower.
        // Calm, warm, human pace — researched target ≈100-120 effective
        // words/min for reassuring narration. Rate sets the within-sentence
        // pace; the 900ms pause below adds the breathing room. The tiny
        // per-sentence pitch drift keeps it from sounding flat or robotic.
        u.rate   = isNeural ? 0.85 : 0.8;
        u.pitch  = (isNeural ? 1.02 : 0.9) + ((i % 2) ? -0.015 : 0.015);
        u.volume = 0.85;
        let started = false;
        u.onstart = ()=>{ started = true; Voice.everStarted = true; };
        u.onend   = ()=> setTimeout(()=> next(i+1), 850);   // a calm breath between sentences
        u.onerror = ()=> setTimeout(()=> next(i+1), 300);
        this._current = u;                                   // pin against GC
        try{ if (speechSynthesis.paused) speechSynthesis.resume(); }catch(e){}
        speechSynthesis.speak(u);
        // Watchdog: Chrome sometimes silently drops an utterance queued
        // right after cancel(). Only intervene if the engine is truly idle
        // (onstart is unreliable on Android — check .speaking too), retry
        // with a FRESH utterance, and never in the same tick as cancel().
        setTimeout(()=>{
          if (started || seq !== this._seq) return;
          try{ if (speechSynthesis.speaking) return; }catch(e){}
          try{ speechSynthesis.cancel(); }catch(e){}
          setTimeout(()=>{
            if (seq !== this._seq) return;
            try{
              const r = new SpeechSynthesisUtterance(u.text);
              r.voice = u.voice; r.rate = u.rate; r.pitch = u.pitch; r.volume = u.volume;
              r.onstart = u.onstart; r.onend = u.onend; r.onerror = u.onerror;
              this._current = r;
              if (speechSynthesis.paused) speechSynthesis.resume();
              speechSynthesis.speak(r);
            }catch(e){}
          }, 120);
        }, 1200);
      }catch(e){}
    };
    // Fast path: if nothing is speaking or queued, speak RIGHT NOW —
    // synchronously, so a session started by a tap speaks *inside* that
    // tap. This is what satisfies iOS/Android autoplay rules. The deferred
    // path below is only needed when we must cancel earlier speech first
    // (Chrome swallows a speak() issued in the same tick as cancel()).
    let busy = false;
    try{ busy = speechSynthesis.speaking || speechSynthesis.pending; }catch(e){}
    if (!busy){
      this._voice = this.pick();
      try{ if (speechSynthesis.paused) speechSynthesis.resume(); }catch(e){}
      next(0);
      return;
    }
    try{ speechSynthesis.cancel(); }catch(e){}
    setTimeout(()=>{
      this._voice = this.pick();
      try{ if (speechSynthesis.paused) speechSynthesis.resume(); }catch(e){}
      next(0);
    }, 100);
  },

  // Why is it silent? Best-effort environment diagnosis.
  environmentHint(){
    const ua = (navigator.userAgent || '');
    if (!this.supported) return 'This browser has no speech support.';
    if (/; wv\)/.test(ua) || /FBAN|FBAV|Instagram|Line\/|Viber|Messenger/i.test(ua))
      return 'You seem to be inside an app\u2019s built-in browser, which usually cannot speak. Tap the \u22ee or share menu and choose \u201cOpen in Chrome\u201d or \u201cOpen in browser.\u201d';
    if (/SamsungBrowser/i.test(ua))
      return 'Samsung Internet often cannot speak. Please open this site in Chrome.';
    if (!this.list().length)
      return 'No English voices are installed. On Android: Settings \u2192 General \u2192 Text-to-speech.';
    return 'Voice could not start. Check the \u266a mute button, silent switch, and media volume \u2014 or try Chrome or Safari.';
  },

  preview(){
    // 'force' bypasses the enabled flag for the duration of the whole
    // async chain — no flag juggling that a queued sentence could trip on.
    this.speak('Settle in. Let the breath come and go, soft and unhurried.', true);
  },

  stop(){
    this._seq++;
    this._current = null;
    try{ if (this.clip) this.clip.pause(); }catch(e){}
    if (!this.supported) return;
    try{ speechSynthesis.cancel(); }catch(e){}
  }
};

/* ---------------- player (session controller) ---------------- */
const Player = {
  el:{}, session:null, timer:null, elapsed:0, total:0,
  paused:false, phaseIdx:0, phaseTimer:null, scriptIdx:0, guideTimer:null,

  init(){
    const $ = id=>document.getElementById(id);
    this.el = {
      root:$('player'), title:$('pTitle'), sub:$('pSub'), orb:$('pOrb'),
      ring:$('pRing'), phase:$('pPhase'), guide:$('pGuide'), clock:$('pClock'),
      pause:$('pPause'), voice:$('pVoice'), soundSel:$('pSoundSel'), close:$('pClose'), mute:$('pMute'),
      done:$('pDone'), moods:$('pMoods'), skip:$('pSkipMood'),
      controlsRow:document.querySelector('.player-controls')
    };
    this.el.close.onclick = ()=> this.end(false);
    this.el.pause.onclick = ()=> this.togglePause();
    this.el.voice.onclick = ()=>{
      Voice.enabled = !Voice.enabled;
      if (!Voice.enabled) Voice.stop();
      else Voice.speak('Voice on.');   // in-gesture speak: unlocks mobile audio and confirms audibly
      this.el.voice.textContent = Voice.enabled ? 'Voice on' : 'Voice off';
      state.data.settings = state.data.settings || {};
      state.data.settings.voice = Voice.enabled;
      store.save(state.data);
    };
    // background soundscape during sessions
    this.el.soundSel.innerHTML =
      '<option value="">No background sound</option>' +
      SOUNDS.map(s=>'<option value="'+s.id+'">'+s.title+'</option>').join('');
    this.el.soundSel.onchange = ()=>{
      const v = this.el.soundSel.value;
      if (v) Audio.startAmbient(v); else Audio.stopAmbient();
      state.data.settings = state.data.settings || {};
      state.data.settings.sessionSound = v;    // '' means explicitly none
      store.save(state.data);
    };
    this.el.mute.onclick  = ()=>{
      Audio.ensure();
      Audio.setMuted(!Audio.muted);
      if (Audio.muted) Voice.stop();
      this.el.mute.textContent = Audio.muted ? '𝄽' : '♪';
      this.el.mute.title = Audio.muted ? 'Unmute sound' : 'Mute sound';
    };
    this.el.skip.onclick = ()=> this.finishAndClose(null);
    MOODS.forEach(([emoji, label])=>{
      const b = document.createElement('button');
      b.className='mood'; b.textContent=emoji; b.title=label;
      b.onclick = ()=> this.finishAndClose(label);
      this.el.moods.appendChild(b);
    });
  },

  open(session){
    this.session = session;
    this.elapsed = 0;
    this.total = session.seconds;
    this.paused = false;
    this.phaseIdx = 0; this.scriptIdx = 0;
    this.el.title.textContent = session.title;
    this.el.sub.textContent = session.subtitle;
    this.el.guide.textContent = ''; this.el.guide.classList.remove('show');
    this.el.phase.textContent = '';
    this.el.done.style.display='none';
    this.el.controlsRow.style.display='flex';
    this.setRing(0);
    this.el.orb.style.transitionDuration = '4s';
    this.el.orb.style.transform = 'scale(1)';
    this.el.orb.classList.add('idle-breath');   // gentle idle while settling in
    this.el.root.classList.add('open');
    Audio.ensure();
    this.lastReminder = 0; this.reminderIdx = 0; this.quietCuesUntil = 0;
    this.el.voice.style.display = Voice.supported ? 'inline-flex' : 'none';
    this.el.voice.textContent = Voice.enabled ? 'Voice on' : 'Voice off';
    if (Voice.supported && !Voice.enabled) Voice.unlock();
    // (when voice is on, the prelude line spoken below IS the in-gesture speak)
    // Background soundscape: remember what was playing before the session,
    // then apply the user's saved session preference (if they've set one).
    this.prevAmbient = Audio.ambientId;
    const pref = (state.data.settings || {}).sessionSound;
    const desired = (pref === undefined || pref === null) ? (Audio.ambientId || '') : pref;
    if (desired && desired !== Audio.ambientId) Audio.startAmbient(desired);
    if (!desired && Audio.ambientId) Audio.stopAmbient();
    this.el.soundSel.value = desired;
    this.startPrelude();
  },

  // A settling-in countdown before every session: arrive first, begin second.
  startPrelude(){
    this.inPrelude = true;
    this.preCount = 10;
    this.el.pause.textContent = 'Begin now';
    this.el.phase.textContent = 'Settling in';
    this.el.clock.textContent = 'beginning in ' + this.preCount;
    const voiceOff = Voice.supported && !Voice.enabled;
    const line = voiceOff
      ? 'Voice guidance is currently off — tap “Voice off” below if you would like to hear it.'
      : 'Settle in. Let the body soften, and the breath slow.';
    const g = this.el.guide;
    g.textContent = line; g.classList.add('show');
    if (!voiceOff){
      Voice.speak(line);
      // If nothing audibly starts, replace the guide text with the reason.
      setTimeout(()=>{
        if (this.inPrelude && Voice.enabled && Voice.supported && !Voice.everStarted && !Audio.muted){
          g.textContent = Voice.environmentHint();
        }
      }, 3500);
    }
    this.preTimer = setInterval(()=>{
      this.preCount--;
      if (this.preCount <= 0){ this.beginSession(); return; }
      this.el.clock.textContent = 'beginning in ' + this.preCount;
    }, 1000);
  },

  beginSession(){
    if (!this.inPrelude) return;
    this.inPrelude = false;
    clearInterval(this.preTimer);
    Voice.stop();                       // never talk over the opening bell
    this.el.pause.textContent = 'Pause';
    this.el.phase.textContent = '';
    this.el.guide.classList.remove('show');
    this.el.orb.classList.toggle('idle-breath', this.session.mode!=='breath');
    Audio.bell(396, 5, .45);
    if (this.session.mode==='breath') this.nextPhase(true);
    this.tick(); // paint the clock immediately
    this.timer = setInterval(()=>this.tick(), 1000);
  },

  setRing(frac){
    const C = 791.7;
    this.el.ring.style.strokeDashoffset = String(C * frac);
  },

  fmt(s){ s=Math.max(0,Math.round(s)); return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); },

  tick(){
    if (this.paused) return;
    const remain = this.total - this.elapsed;
    this.el.clock.textContent = this.fmt(remain) + ' left';
    this.setRing(this.elapsed / this.total);

    if (this.session.script){
      const script = this.session.script;
      while (this.scriptIdx < script.length && script[this.scriptIdx][0] <= this.elapsed){
        this.showGuide(script[this.scriptIdx][1]);
        this.scriptIdx++;
      }
    }
    if (this.elapsed >= this.total){ this.complete(); return; }
    this.elapsed++;
  },

  showGuide(text){
    const g = this.el.guide;
    g.classList.remove('show');
    setTimeout(()=>{ g.textContent = text; g.classList.add('show'); }, 350);
    if (this.session && this.session.script) Voice.speak(text);
  },

  nextPhase(first){
    if (!this.session || this.session.mode!=='breath' || this.paused) return;
    const pattern = this.session.pattern;
    const [label, secs] = pattern[this.phaseIdx % pattern.length];
    this.el.phase.textContent = label;
    const orb = this.el.orb;
    orb.style.transitionDuration = secs + 's';
    if (/in/i.test(label))       orb.style.transform = 'scale(1.22)';
    else if (/out/i.test(label)) orb.style.transform = 'scale(0.82)';
    // holds keep the current scale

    // Spoken guidance: cue every phase so eyes can stay closed. Roughly
    // every 75 seconds, the start of a cycle carries a focus reminder
    // instead — and cues stay quiet for that cycle so the reminder is
    // never cut off mid-sentence. The orb keeps leading the rhythm.
    const cycleStart = (this.phaseIdx % pattern.length) === 0;
    const cycleLen = pattern.reduce((a,p)=>a+p[1], 0);
    if (cycleStart && this.elapsed > 20 && this.elapsed - this.lastReminder > 75){
      this.lastReminder = this.elapsed;
      this.quietCuesUntil = this.elapsed + cycleLen;
      const line = BREATH_REMINDERS[this.reminderIdx++ % BREATH_REMINDERS.length];
      this.showGuide(line);          // display it (breath sessions have no script, so no double-speak)
      Voice.speak(line);
    } else if (this.elapsed >= (this.quietCuesUntil || 0)){
      Voice.speak(label);
    }

    this.phaseIdx++;
    this.phaseTimer = setTimeout(()=>this.nextPhase(false), secs*1000);
  },

  togglePause(){
    if (this.inPrelude){ this.beginSession(); return; }   // "Begin now" skips the countdown
    this.paused = !this.paused;
    this.el.pause.textContent = this.paused ? 'Resume' : 'Pause';
    if (this.paused) Voice.stop();
    if (this.session.mode==='breath'){
      if (this.paused){ clearTimeout(this.phaseTimer); this.el.phase.textContent='Paused'; }
      else { this.phaseIdx = Math.max(0, this.phaseIdx-1); this.nextPhase(false); }
    }
  },

  complete(){
    clearInterval(this.timer); clearTimeout(this.phaseTimer); clearInterval(this.preTimer); this.inPrelude = false;
    Voice.stop();
    Audio.bell(396, 6, .5);
    setTimeout(()=>Audio.bell(528, 6, .3), 900);
    this.el.phase.textContent=''; this.el.clock.textContent='';
    this.el.guide.classList.remove('show');
    this.el.orb.style.transitionDuration = '4s';
    this.el.orb.style.transform = 'scale(1)';
    this.el.orb.classList.add('idle-breath');
    this.el.controlsRow.style.display='none';
    this.el.done.style.display='block';
    this.el.done.classList.add('fade-in');
  },

  async finishAndClose(mood){
    const s = this.session;
    state.data.sessions.push({ id:s.id, title:s.title, minutes:Math.max(1, Math.round(s.seconds/60)), ts:Date.now() });
    if (mood) state.data.moods.push({ mood, ts:Date.now() });
    await store.save(state.data);
    this.closeOnly();
    render();
  },

  end(completed){
    // closed early: record partial minutes if ≥ 1 minute elapsed
    clearInterval(this.timer); clearTimeout(this.phaseTimer); clearInterval(this.preTimer); this.inPrelude = false;
    if (!completed && this.elapsed >= 60 && this.session){
      state.data.sessions.push({
        id:this.session.id, title:this.session.title,
        minutes:Math.floor(this.elapsed/60), ts:Date.now()
      });
      store.save(state.data).then(render);
    }
    this.closeOnly();
  },

  closeOnly(){
    clearInterval(this.timer); clearTimeout(this.phaseTimer); clearInterval(this.preTimer); this.inPrelude = false;
    Voice.stop();
    // put the world back the way it was before the session
    if (Audio.ambientId !== this.prevAmbient){
      if (this.prevAmbient) Audio.startAmbient(this.prevAmbient);
      else Audio.stopAmbient();
    }
    this.session = null;
    this.el.root.classList.remove('open');
  }
};

/* ---------------- tutorial tour ----------------
   A narrated walkthrough shown on first visit and replayable from the
   You tab. Narration uses the same on-device Voice engine as sessions.
   Speech only starts after the first tap (browsers require a gesture).
-------------------------------------------------- */
const ICONS = {
  sun:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4.5"/><path d="M12 2.5v3M12 18.5v3M2.5 12h3M18.5 12h3M5.3 5.3l2.1 2.1M16.6 16.6l2.1 2.1M18.7 5.3l-2.1 2.1M7.4 16.6l-2.1 2.1"/></svg>',
  voice:'<svg viewBox="0 0 24 24"><path d="M4 10v4h4l5 5V5L8 10H4z"/><path d="M16.5 8.5a5 5 0 0 1 0 7M19 6a8.5 8.5 0 0 1 0 12"/></svg>',
  sound:'<svg viewBox="0 0 24 24"><path d="M3 12h2M7 8v8M11 5v14M15 8v8M19 10v4"/></svg>',
  person:'<svg viewBox="0 0 24 24"><circle cx="12" cy="8.2" r="3.7"/><path d="M4.8 20c1.3-3.4 4-5.1 7.2-5.1s5.9 1.7 7.2 5.1"/></svg>',
  lock:'<svg viewBox="0 0 24 24"><rect x="5" y="10.5" width="14" height="9.5" rx="2.5"/><path d="M8 10.5V7.8a4 4 0 0 1 8 0v2.7M12 14.5v2.5"/></svg>'
};

const TOUR_STEPS = [
  { visual:'orb', title:'Welcome to Stillwater',
    text:'A quiet place on your device. No accounts. No tracking. Let me show you around.' },
  { visual:ICONS.sun, title:'Start with Today',
    text:'One session for this hour. Tap the orb to begin.' },
  { visual:ICONS.voice, title:'Guided sessions speak',
    text:'Prompts appear, read aloud. The voice button turns narration on or off.' },
  { visual:'orb', title:'Breathe with the orb',
    text:'In as it swells, out as it settles.' },
  { visual:ICONS.sound, title:'Silence and soundscapes',
    text:'A quiet sit with bells, or rain, tide, and wind.' },
  { visual:ICONS.person, title:'Your practice, kept for you',
    text:'Streaks, minutes, moods — on this device only.' },
  { visual:ICONS.lock, title:'Private by design',
    text:'Nothing is uploaded or tracked. Breathe, and begin when ready.' }
];

const Tour = {
  idx:0, narrate:true, unlocked:false, el:{},

  init(){
    const $ = id=>document.getElementById(id);
    this.el = { root:$('tour'), visual:$('tVisual'), step:$('tStep'), title:$('tTitle'),
                text:$('tText'), dots:$('tDots'), back:$('tBack'), next:$('tNext'),
                skip:$('tSkip'), voice:$('tVoice') };
    this.el.next.onclick = ()=>{
      this.unlocked = true;   // this tap is the speech gesture; say() below
                              // speaks synchronously inside it (no decoy
                              // utterance — that would mark the engine busy
                              // and push real speech outside the gesture)
      if (this.idx >= TOUR_STEPS.length-1) this.finish();
      else this.show(this.idx+1);
    };
    this.el.back.onclick = ()=>{ if (this.idx>0) this.show(this.idx-1); };
    this.el.skip.onclick = ()=> this.finish();
    this.el.voice.onclick = ()=>{
      this.narrate = !this.narrate;
      this.el.voice.textContent = this.narrate ? '♪' : '𝄽';
      this.el.voice.title = this.narrate ? 'Narration on' : 'Narration off';
      if (!this.narrate) Voice.stop();
      else this.say();
    };
    if (!Voice.supported) this.el.voice.style.display='none';
  },

  open(manual){
    this.idx = 0;
    this.unlocked = !!manual;   // opened by a tap → can narrate immediately
    this.el.root.classList.add('open');
    this.show(0);
  },

  show(i){
    this.idx = i;
    const s = TOUR_STEPS[i];
    this.el.visual.innerHTML = s.visual==='orb' ? '<div class="orb idle-breath"></div>' : s.visual;
    this.el.step.textContent = 'Step ' + (i+1) + ' of ' + TOUR_STEPS.length;
    this.el.title.textContent = s.title;
    this.el.text.textContent = s.text;
    this.el.back.style.display = i===0 ? 'none' : 'inline-flex';
    this.el.next.textContent = i===0 ? 'Take the tour'
                              : i===TOUR_STEPS.length-1 ? 'Begin' : 'Next';
    this.el.dots.innerHTML = TOUR_STEPS.map((_,d)=>'<span class="'+(d===i?'on':'')+'"></span>').join('');
    this.say();
  },

  say(){
    if (!this.narrate || !this.unlocked || !Voice.supported) return;
    const s = TOUR_STEPS[this.idx];
    Voice.speak(s.title + '. ' + s.text, true);   // force: independent of session voice setting
  },

  finish(){
    Voice.stop();
    this.el.root.classList.remove('open');
    state.data.settings = state.data.settings || {};
    state.data.settings.tourDone = true;
    store.save(state.data);
  }
};

/* ---------------- session builders ---------------- */

// Short focus reminders spoken during breathing exercises — one roughly
// every 75 seconds, in place of that cycle's cue, so eyes can stay closed.
const BREATH_REMINDERS = [
  'Mind wandered? That is okay. Come back.',
  'Let thoughts pass. Follow the breath.',
  'Soften the shoulders with each breath out.',
  'Cool air in. Warm air out.',
  'Nothing to get right. Just this breath.'
];

// The quiet sit stays mostly silent, with a few gentle anchors:
// an opening instruction, a reminder every ~2.5 minutes, and a soft warning
// before the closing bell. All optional via the Voice toggle.
function timerScript(minutes){
  const total = minutes*60;
  const lines = [[3, 'Settle in. Rest your attention on the breath.']];
  const rem = [
    'Noticing thought? Gently return to the breath.',
    'Come back to the body, and the breath.',
    'Begin again. Each return is the practice.',
    'Let sounds drift past, like clouds.'
  ];
  let i = 0;
  for (let t = 150; t < total - 60; t += 150, i++){
    lines.push([t, rem[i % rem.length]]);
  }
  if (total >= 180) lines.push([total - 25, 'The bell will sound soon.']);
  return lines;
}

function startGuided(item){
  Player.open({
    id:item.id, title:item.title, subtitle:item.tag + ' · ' + item.minutes + ' min',
    mode:'guided', seconds:item.minutes*60, script:item.script
  });
}
function startBreath(item, minutes){
  Player.open({
    id:item.id, title:item.title, subtitle:'Breathing · ' + minutes + ' min',
    mode:'breath', seconds:minutes*60, pattern:item.pattern
  });
}
function startTimer(minutes){
  Player.open({
    id:'timer', title:'Quiet Sit', subtitle:'Unguided · ' + minutes + ' min',
    mode:'timer', seconds:minutes*60, script:timerScript(minutes)
  });
}

/* ---------------- views ---------------- */
const view = ()=>document.getElementById('view');

function h(html){ const t=document.createElement('template'); t.innerHTML=html.trim(); return t.content; }

function greeting(){
  const hr = new Date().getHours();
  if (hr<5)  return 'Still awake?';
  if (hr<12) return 'Good morning.';
  if (hr<18) return 'Good afternoon.';
  return 'Good evening.';
}
function suggested(){
  const hr = new Date().getHours();
  if (hr<5)  return GUIDED.find(g=>g.id==='letgo');
  if (hr<12) return GUIDED.find(g=>g.id==='arriving');
  if (hr<18) return GUIDED.find(g=>g.id==='focus');
  return GUIDED.find(g=>g.id==='gratitude');
}

function card(item, metaText, onclick){
  const el = document.createElement('div');
  el.className='card fade-in';
  el.innerHTML = '<div class="row"><div><div class="meta">'+metaText+'</div>'+
    '<h3>'+item.title+'</h3><p>'+item.desc+'</p></div>'+
    '<div style="font-size:20px;color:var(--faint);">›</div></div>';
  el.onclick = onclick;
  return el;
}

function renderToday(){
  const v = view(); v.innerHTML='';
  const st = streak();
  const grid = document.createElement('div'); grid.className='today-grid';

  const hero = document.createElement('section');
  const head = document.createElement('div');
  head.className = 'row fade-in';
  head.style.alignItems = 'flex-start';
  const headText = document.createElement('div');
  headText.innerHTML =
    '<div class="eyebrow">Stillwater</div>'+
    '<div class="greeting">'+greeting()+'</div>'+
    '<div class="sub">'+ (st>0 ? st+'-day streak · '+totalMinutes()+' quiet minutes so far'
                                : 'A quiet place that never leaves your device.') +'</div>';
  const helpBtn = document.createElement('button');
  helpBtn.className = 'icon-btn';
  helpBtn.textContent = '?';
  helpBtn.title = 'View the tutorial';
  helpBtn.setAttribute('aria-label','View the tutorial');
  helpBtn.style.flexShrink = '0';
  helpBtn.onclick = ()=> Tour.open(true);
  head.appendChild(headText);
  head.appendChild(helpBtn);
  hero.appendChild(head);
  const wrap = document.createElement('div'); wrap.className='orb-wrap';
  const orb = document.createElement('div'); orb.className='orb idle-breath';
  orb.title='Start today\u2019s session';
  const sug = suggested();
  orb.onclick = ()=>startGuided(sug);
  wrap.appendChild(orb);
  const cap = document.createElement('div');
  cap.className='sub'; cap.style.marginTop='22px'; cap.style.textAlign='center';
  cap.innerHTML = 'Suggested now: <span style="color:var(--ink)">'+sug.title+'</span> · '+sug.minutes+' min<br><span style="font-size:12.5px;color:var(--faint)">tap the orb to begin</span>';
  wrap.appendChild(cap);
  hero.appendChild(wrap);

  const quick = document.createElement('section');
  quick.appendChild(h('<div class="section-title">Or choose your own pace</div>'));
  quick.appendChild(card(GUIDED.find(g=>g.id==='reset'), 'SOS · 1 min', ()=>startGuided(GUIDED.find(g=>g.id==='reset'))));
  quick.appendChild(card(BREATHS[0], 'Breathe · 3 min', ()=>startBreath(BREATHS[0],3)));
  quick.appendChild(card(GUIDED.find(g=>g.id==='letgo'), 'Sleep · 8 min', ()=>startGuided(GUIDED.find(g=>g.id==='letgo'))));

  // Soundscape quick control — mirrors the global ambient state
  const sc = document.createElement('div');
  sc.className='card fade-in'; sc.style.cursor='default';
  sc.innerHTML = '<div class="meta">Soundscape</div><h3>Background sound</h3>'+
    '<p>Plays under everything — sessions included. Tap Off any time.</p>'+
    '<div class="pillrow"></div>';
  const spr = sc.querySelector('.pillrow');
  const mkPill = (label, id)=>{
    const p = document.createElement('button');
    p.className = 'pill' + ((Audio.ambientId||'')===id ? ' on' : '');
    p.textContent = label;
    p.onclick = ()=>{
      if (id) Audio.startAmbient(id); else Audio.stopAmbient();
      renderToday();   // refresh pill states without scrolling away
    };
    spr.appendChild(p);
  };
  mkPill('Off','');
  SOUNDS.forEach(s=> mkPill(s.title, s.id));
  quick.appendChild(sc);

  quick.appendChild(h(
    '<div class="footer-note">Free · private · no ads — '+
    '<a href="'+DONATE_URL+'" target="_blank" rel="noopener noreferrer" '+
    'style="color:var(--muted); text-decoration:underline; text-underline-offset:3px;">'+
    'donate to keep it running</a></div>'
  ));

  grid.appendChild(hero); grid.appendChild(quick);
  v.appendChild(grid);
}

function renderExplore(){
  const v = view(); v.innerHTML='';
  v.appendChild(h('<div class="fade-in"><div class="eyebrow">Library</div><div class="greeting" style="font-size:28px;">Explore</div></div>'));

  v.appendChild(h('<div class="section-title">Guided</div>'));
  const gGrid = document.createElement('div'); gGrid.className='card-grid';
  GUIDED.forEach(g=> gGrid.appendChild(card(g, g.tag+' · '+g.minutes+' min', ()=>startGuided(g))));
  v.appendChild(gGrid);

  v.appendChild(h('<div class="section-title">Breathe</div>'));
  const bGrid = document.createElement('div'); bGrid.className='card-grid';
  BREATHS.forEach(b=>{
    const el = document.createElement('div');
    el.className='card fade-in';
    el.innerHTML = '<div class="meta">'+b.tag+'</div><h3>'+b.title+'</h3><p>'+b.desc+'</p>'+
      '<div class="pillrow"></div>';
    const pr = el.querySelector('.pillrow');
    [1,3,5,10].forEach(min=>{
      const p = document.createElement('button');
      p.className='pill'; p.textContent = min+' min';
      p.onclick = (e)=>{ e.stopPropagation(); startBreath(b, min); };
      pr.appendChild(p);
    });
    bGrid.appendChild(el);
  });
  v.appendChild(bGrid);

  v.appendChild(h('<div class="section-title">Quiet Sit</div>'));
  const t = document.createElement('div');
  t.className='card fade-in';
  t.innerHTML='<div class="meta">Unguided</div><h3>Just a bell at each end</h3>'+
    '<p>Near-silence in between — a gentle spoken reminder every few minutes brings you back to the breath. Turn the voice off for pure silence.</p><div class="pillrow"></div>';
  const pr = t.querySelector('.pillrow');
  [5,10,15,20,30].forEach(min=>{
    const p=document.createElement('button');
    p.className='pill'; p.textContent=min+' min';
    p.onclick=(e)=>{e.stopPropagation(); startTimer(min);};
    pr.appendChild(p);
  });
  v.appendChild(t);

  v.appendChild(h('<div class="section-title">Soundscapes</div>'));
  const sGrid = document.createElement('div'); sGrid.className='card-grid';
  SOUNDS.forEach(s=>{
    const el = document.createElement('div');
    el.className='card sound-card fade-in';
    el.style.cursor='default';
    const playing = Audio.ambientId===s.id;
    el.innerHTML='<div class="row"><div><h3>'+s.title+'</h3><p style="margin-top:2px;">'+s.desc+'</p></div>'+
      '<button class="btn small '+(playing?'':'ghost')+'">'+(playing?'Stop':'Play')+'</button></div>';
    el.querySelector('button').onclick = ()=>{
      if (Audio.ambientId===s.id) Audio.stopAmbient();
      else Audio.startAmbient(s.id);
      renderExplore();
    };
    sGrid.appendChild(el);
  });
  v.appendChild(sGrid);
  v.appendChild(h('<div class="footer-note">Sounds are generated on your device — no files, no streaming.</div>'));
}

function renderYou(){
  const v = view(); v.innerHTML='';
  const w = document.createElement('div'); w.className='you-wrap';
  w.appendChild(h('<div class="fade-in"><div class="eyebrow">Your practice</div><div class="greeting" style="font-size:28px;">You</div></div>'));

  w.appendChild(h(
    '<div class="stat-grid" style="margin-top:20px;">'+
      '<div class="stat"><div class="num">'+streak()+'</div><div class="lbl">day streak</div></div>'+
      '<div class="stat"><div class="num">'+state.data.sessions.length+'</div><div class="lbl">sessions</div></div>'+
      '<div class="stat"><div class="num">'+totalMinutes()+'</div><div class="lbl">minutes</div></div>'+
    '</div>'
  ));

  w.appendChild(h('<div class="section-title">Recent sessions</div>'));
  const recent = state.data.sessions.slice(-8).reverse();
  if (!recent.length){
    w.appendChild(h('<div class="empty">Nothing yet. Your first session is the hardest — it takes one minute.</div>'));
  } else {
    recent.forEach(s=>{
      const d = new Date(s.ts);
      const when = d.toLocaleDateString(undefined,{month:'short',day:'numeric'}) + ' · ' +
                   d.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});
      const mood = state.data.moods.find(m=>Math.abs(m.ts - s.ts) < 120000);
      const moodEmoji = mood ? ' ' + (MOODS.find(x=>x[1]===mood.mood)||[''])[0] : '';
      w.appendChild(h('<div class="log-item"><span>'+s.title+moodEmoji+'</span>'+
        '<span class="when">'+s.minutes+' min · '+when+'</span></div>'));
    });
  }

  w.appendChild(h(
    '<div class="privacy"><strong>Private by design.</strong><br>'+
    'Stillwater makes no network requests. Your history is stored only on this device, '+
    'and you can take it with you or wipe it below.</div>'
  ));

  const support = document.createElement('div');
  support.className='privacy';
  support.style.borderStyle='solid';
  support.innerHTML =
    '<strong>Enjoying the quiet?</strong><br>'+
    'Stillwater is free, has no ads, and collects nothing. '+
    'If it helps you, a small donation keeps the site running.<br>';
  const donate = document.createElement('a');
  donate.href = DONATE_URL;
  donate.target = '_blank';
  donate.rel = 'noopener noreferrer';
  donate.className = 'btn small';
  donate.style.cssText = 'margin-top:14px; text-decoration:none;';
  donate.textContent = 'Donate via PayPal ♡';
  support.appendChild(donate);
  w.appendChild(support);

  const rowEl = document.createElement('div');
  rowEl.style.cssText='display:flex; gap:10px; justify-content:center; margin-top:16px; flex-wrap:wrap;';
  const tut = document.createElement('button');
  tut.className='btn ghost small'; tut.textContent='View the tutorial';
  tut.onclick = ()=> Tour.open(true);
  rowEl.appendChild(tut);
  const exp = document.createElement('button');
  exp.className='btn ghost small'; exp.textContent='Export my data';
  exp.onclick = ()=>{
    const blob = new Blob([JSON.stringify(state.data,null,2)],{type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download='stillwater-data.json';
    a.click(); URL.revokeObjectURL(a.href);
  };
  const del = document.createElement('button');
  del.className='btn ghost small'; del.textContent='Erase everything';
  del.onclick = async ()=>{
    if (!confirm('Erase all local practice history? This cannot be undone.')) return;
    state.data = {sessions:[], moods:[]};
    await store.erase();
    render();
  };
  rowEl.appendChild(exp); rowEl.appendChild(del);
  w.appendChild(rowEl);

  // Voice diagnostic: speaks in-gesture and reports what it found.
  const diag = document.createElement('div');
  diag.style.cssText='text-align:center; margin-top:14px;';
  const vtest = document.createElement('button');
  vtest.className='btn ghost small'; vtest.textContent='Test voice';
  const vstat = document.createElement('div');
  vstat.className='footer-note'; vstat.style.marginTop='10px';
  vtest.onclick = ()=>{
    if (!Voice.supported){ vstat.textContent='This browser has no speech synthesis.'; return; }
    const vs = Voice.list();
    if (!vs.length){ vstat.textContent='No English voices installed on this device. On Android: Settings → Text-to-speech.'; return; }
    const chosen = Voice.pick();
    vstat.textContent = 'Trying \u201c'+(chosen?chosen.name:'default')+'\u201d ('+vs.length+' voices available)\u2026';
    Voice.everStarted = false;
    Voice.speak('If you can hear this, voice guidance is working.', true);
    setTimeout(()=>{
      vstat.textContent = Voice.everStarted
        ? 'Voice is working \u2014 spoke with \u201c'+(chosen?chosen.name:'default')+'\u201d.'
        : Voice.environmentHint();
    }, 3000);
  };
  diag.appendChild(vtest); diag.appendChild(vstat);
  w.appendChild(diag);

  w.appendChild(h('<div class="footer-note" style="margin-top:18px;">Stillwater '+APP_VERSION+'</div>'));  v.appendChild(w);
}

/* ---------------- nav & boot ---------------- */
const TABS = [
  ['today','Today','<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4.5"/><path d="M12 2.5v3M12 18.5v3M2.5 12h3M18.5 12h3M5.3 5.3l2.1 2.1M16.6 16.6l2.1 2.1M18.7 5.3l-2.1 2.1M7.4 16.6l-2.1 2.1"/></svg>'],
  ['explore','Explore','<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9.5"/><path d="M15.5 8.5 13.4 13.4 8.5 15.5l2.1-4.9z"/></svg>'],
  ['you','You','<svg viewBox="0 0 24 24"><circle cx="12" cy="8.2" r="3.7"/><path d="M4.8 20c1.3-3.4 4-5.1 7.2-5.1s5.9 1.7 7.2 5.1"/></svg>']
];

function renderNav(){
  const nav = document.getElementById('nav');
  nav.innerHTML='';
  const brand = document.createElement('div');
  brand.className='brand'; brand.textContent='Stillwater';
  nav.appendChild(brand);
  TABS.forEach(([id,label,icon])=>{
    const b=document.createElement('button');
    b.className = state.tab===id ? 'on':'';
    b.innerHTML = icon + '<span>'+label+'</span>';
    b.onclick = ()=>{ state.tab=id; render(); };
    nav.appendChild(b);
  });
}

function render(){
  renderNav();
  if (state.tab==='today') renderToday();
  else if (state.tab==='explore') renderExplore();
  else renderYou();
  window.scrollTo(0,0);
}

(async function boot(){
  Player.init();
  Voice.init();
  Voice.probeFiles();
  Tour.init();
  const saved = await store.load();
  if (saved && saved.sessions) state.data = saved;
  if (state.data.settings && state.data.settings.voice === false) Voice.enabled = false;
  render();
  // The tour greets every visit. (To show it only on first visits instead,
  // wrap this line in: if (!state.data.settings || !state.data.settings.tourDone) ... )
  Tour.open(false);
})();
</script>
